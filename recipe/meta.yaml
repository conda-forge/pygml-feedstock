{% set name = "pygml" %}
{% set version = "0.3.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: eeb4175daa25200881b90c071df3d9249079b7e0c78485d7d773974556892b16

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}
    - dataclasses
    - lxml

test:
  source_files:
    - tests
    - tests/*.py
  imports:
    - pygml
  requires:
    - pytest
    - python {{ python_min }}
  commands:
    - pytest

about:
  home: https://github.com/geopython/pygml
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: A pure python parser and encoder for OGC GML Geometries
  # The remaining entries in this section are optional, but recommended.
  description: |
    pygml is a pure python and GDAL-free parser and decoder built for converting
    GML 3.1, 3.2, compact encoded GML 3.3 and GeoRSS geometries to a Geo Interface compliant class.
  dev_url: https://github.com/geopython/pygml

extra:
  recipe-maintainers:
    - constantinius
    - Zeitsperre
